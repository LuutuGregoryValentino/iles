<!DOCTYPE html>
<html lang="">
<head>
    <title>ILES Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arail;
            display: flex;
        }
        /* Sidebar */
        .sidebar {
            width: 200px;
            background: #2c3e50;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }
        /* Main content */
        .main {
            flex: 1;
            padding: 20px;
            background: #ecf0f1;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>ILES</h2>
        <a href="#">Dashboard</a>
        <a href="#">Submit Report</a>
        <a href="#">My Reports</a>
        <a href="#">Supervisor</a>
        <a href="#">Logout</a>
        <a href="/report/">Submit Report</a>
    </div>
    <div class="main">
        <h1>Welcome Student  👋 </h1>

        <div class="card">
            <h2>Internship Status</h2>
            <p>Active.</p>
        </div>
        <div class="card">
            <h2>Reports Submitted</h2>
            <p>5 Reports</p>
        </div>
        <div class="card">
            <h2>Supervisor Feedback</h2>
            <p>No new feedback</p>
        </div>
    </div>
</body>
</html>
