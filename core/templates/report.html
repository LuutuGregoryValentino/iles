<!DOCTYPE html>
<html>
<head>
    <title>Submit Report</title>
</head>
<body>

<h2>Submit Internship Report</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Date:</label><br>
    <input type="date" name="date" required><br><br>

    <label>Description:</label><br>
    <textarea name="description" rows="5" required></textarea><br><br>

    <label>Hours Worked:</label><br>
    <input type="number" name="hours" min="1" required><br><br>

    <label>Challenges:</label><br>
    <textarea name="challenges" rows="3"></textarea><br><br>

    <label>Attachment:</label><br>
    <input type="file" name="attachment"><br><br> 

    <button type="submit">Submit Report</button>
</form>

</body>
</html>
